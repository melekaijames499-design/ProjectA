<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — SmartFarm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { DEFAULT: '#1B4332', light: '#2D6A4F', pale: '#D8F3DC' },
            secondary: '#52B788',
            accent: { DEFAULT: '#F59E0B', dark: '#D97706' },
          },
          fontFamily: { sans: ['Inter','sans-serif'], display: ['Playfair Display','serif'] }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-green-900 via-primary to-green-800 flex items-center justify-center p-4">

  <div class="w-full max-w-lg">
    <!-- Logo -->
    <div class="text-center mb-8">
      <a href="/index.html" class="inline-flex items-center gap-3">
        <div class="w-12 h-12 bg-secondary rounded-2xl flex items-center justify-center text-2xl shadow-lg">🌱</div>
        <div class="text-left">
          <p class="font-display font-bold text-white text-2xl">SmartFarm</p>
          <p class="text-green-300 text-xs -mt-1">Irrigation System</p>
        </div>
      </a>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-3xl shadow-2xl p-8 md:p-10">
      <h1 class="text-2xl font-display font-bold text-primary mb-1">Create Your Account</h1>
      <p class="text-sm text-gray-500 mb-8">Join SmartFarm and start monitoring your farm today.</p>

      <!-- Error Banner -->
      <div id="error-banner" class="hidden mb-5 p-4 bg-red-50 border border-red-200 rounded-xl">
        <p id="error-text" class="text-sm text-red-700 font-medium"></p>
      </div>

      <!-- Success Banner -->
      <div id="success-banner" class="hidden mb-5 p-4 bg-green-50 border border-green-200 rounded-xl">
        <p class="text-sm text-green-700 font-medium">✅ Account created successfully! Redirecting to login...</p>
      </div>

      <form id="register-form" class="space-y-5" onsubmit="handleRegister(event)">

        <!-- Name -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
          <input type="text" id="name" placeholder="e.g. Samuel Ochieng" required
            class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-secondary">
        </div>

        <!-- Email -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
          <input type="email" id="email" placeholder="yourname@email.com" required
            class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-secondary">
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <div class="relative">
            <input type="password" id="password" placeholder="At least 6 characters" required minlength="6"
              class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-secondary pr-12">
            <button type="button" onclick="togglePwd('password')" class="absolute right-3 top-3 text-gray-400 hover:text-gray-600 text-lg">👁</button>
          </div>
        </div>

        <!-- Confirm Password -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
          <div class="relative">
            <input type="password" id="confirm-password" placeholder="Repeat your password" required
              class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-secondary pr-12">
            <button type="button" onclick="togglePwd('confirm-password')" class="absolute right-3 top-3 text-gray-400 hover:text-gray-600 text-lg">👁</button>
          </div>
        </div>

        <!-- Password strength indicator -->
        <div id="strength-bar" class="hidden">
          <div class="flex gap-1 mt-1">
            <div id="s1" class="h-1 flex-1 rounded-full bg-gray-200"></div>
            <div id="s2" class="h-1 flex-1 rounded-full bg-gray-200"></div>
            <div id="s3" class="h-1 flex-1 rounded-full bg-gray-200"></div>
            <div id="s4" class="h-1 flex-1 rounded-full bg-gray-200"></div>
          </div>
          <p id="strength-label" class="text-xs text-gray-400 mt-1"></p>
        </div>

        <!-- Terms -->
        <div class="flex items-start gap-3">
          <input type="checkbox" id="terms" required class="mt-1 w-4 h-4 rounded text-secondary border-gray-300">
          <label for="terms" class="text-sm text-gray-600">
            I agree to the <a href="#" class="text-secondary hover:underline">Terms of Service</a> and
            <a href="#" class="text-secondary hover:underline">Privacy Policy</a>
          </label>
        </div>

        <!-- Submit -->
        <button type="submit" id="submit-btn"
          class="w-full bg-primary hover:bg-primary-light text-white font-bold py-4 rounded-xl transition-all shadow-md">
          Create Account
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-6">
        Already have an account?
        <a href="/login.html" class="text-secondary font-semibold hover:text-primary transition-colors">Sign in</a>
      </p>
    </div>

    <p class="text-center text-xs text-white/40 mt-6">
      <a href="/index.html" class="hover:text-white">← Back to home</a>
    </p>
  </div>

  <script>
    // Toggle password visibility
    function togglePwd(id) {
      const el = document.getElementById(id);
      el.type = el.type === 'password' ? 'text' : 'password';
    }

    // Password strength
    document.getElementById('password').addEventListener('input', function () {
      const val = this.value;
      const bar = document.getElementById('strength-bar');
      bar.classList.remove('hidden');

      const bars = ['s1', 's2', 's3', 's4'];
      bars.forEach(id => document.getElementById(id).className = 'h-1 flex-1 rounded-full bg-gray-200');

      let score = 0;
      if (val.length >= 6) score++;
      if (val.length >= 10) score++;
      if (/[A-Z]/.test(val) && /[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;

      const colors = ['bg-red-400', 'bg-orange-400', 'bg-yellow-400', 'bg-green-500'];
      const labels = ['Weak', 'Fair', 'Good', 'Strong'];
      for (let i = 0; i < score; i++) {
        document.getElementById(bars[i]).className = `h-1 flex-1 rounded-full ${colors[score - 1]}`;
      }
      document.getElementById('strength-label').textContent = score > 0 ? labels[score - 1] : '';
    });

    // Error / success helpers
    function showError(msg) {
      document.getElementById('error-text').textContent = msg;
      document.getElementById('error-banner').classList.remove('hidden');
      document.getElementById('success-banner').classList.add('hidden');
    }
    function hideError() {
      document.getElementById('error-banner').classList.add('hidden');
    }

    // Register handler
    async function handleRegister(e) {
      e.preventDefault();
      hideError();

      const name            = document.getElementById('name').value.trim();
      const email           = document.getElementById('email').value.trim();
      const password        = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      const btn             = document.getElementById('submit-btn');

      if (password !== confirmPassword) {
        showError('Passwords do not match.');
        return;
      }

      if (password.length < 6) {
        showError('Password must be at least 6 characters.');
        return;
      }

      btn.disabled     = true;
      btn.textContent  = 'Creating account...';

      try {
        const res  = await fetch('/api/auth/register', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ name, email, password })
        });
        const data = await res.json();

        if (!data.success) {
          showError(data.error || 'Registration failed. Please try again.');
          return;
        }

        // Show success, redirect to login
        document.getElementById('register-form').style.opacity = '0.4';
        document.getElementById('register-form').style.pointerEvents = 'none';
        document.getElementById('success-banner').classList.remove('hidden');

        setTimeout(() => {
          window.location.href = '/login.html?registered=true';
        }, 2000);

      } catch (err) {
        showError('Cannot reach the server. Make sure it is running.');
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Create Account';
      }
    }
  </script>
</body>
</html>
