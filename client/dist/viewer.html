<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viewer — Smart Irrigation System</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-green-50 flex items-center justify-center">
  <div class="text-center">
    <div class="text-5xl mb-4">🌱</div>
    <h1 class="text-2xl font-bold text-green-900">Viewer Portal</h1>
    <p class="text-gray-500 mt-2">Full dashboard coming in Phase 12.</p>
    <button onclick="logout()" class="mt-6 px-6 py-2 bg-green-800 text-white rounded-lg text-sm">Sign Out</button>
  </div>
  <script>
    const user = JSON.parse(sessionStorage.getItem('currentUser') || 'null');
    if (!user || !['viewer','admin'].includes(user.role)) window.location.href = '/login.html?error=unauthorized';
    function logout() { sessionStorage.clear(); window.location.href = '/login.html'; }
  </script>
</body>
</html>
